<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - RailPass</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <header>
        <nav class="navbar"></nav>
    </header>

    <main class="auth-wrapper">
        <div class="auth-card glass-card">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Register as a Buyer to book tickets or a Seller to manage routes.</p>
            </div>

            <form id="register-form">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" class="form-input" placeholder="Min 3 characters" required minlength="3">
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="e.g. user@example.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Min 6 characters" required minlength="6">
                </div>

                <div class="form-group">
                    <label class="form-label" for="role">Account Role</label>
                    <select id="role" required>
                        <option value="ROLE_BUYER">Buyer (Book tickets)</option>
                        <option value="ROLE_SELLER">Seller (Manage trains & schedules)</option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
                    Register
                </button>
            </form>

            <div style="text-align: center; margin-top: 24px; font-size: 14px; color: var(--text-muted);">
                Already have an account? <a href="/login.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign In</a>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 RailPass. Experience premium transit booking.</p>
    </footer>

    <script src="/js/auth.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
