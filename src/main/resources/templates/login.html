<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/main :: head('Sign In')}"></head>
<body>

    <header th:replace="~{layout/main :: navbar}"></header>
    
    <div th:replace="~{layout/main :: toasts}"></div>

    <main style="display: flex; align-items: center; justify-content: center; min-height: 70vh;">
        <div class="auth-container glass-card">
            <h2 class="auth-title">Welcome Back</h2>
            <p class="auth-subtitle">Sign in to book event tickets and manage your inventory.</p>
            
            <!-- Success message from registration -->
            <div th:if="${param.registered}" class="badge badge-success" style="width: 100%; text-align: center; padding: 12px; margin-bottom: 20px; border-radius: 10px;">
                Registration successful! Please sign in below.
            </div>

            <!-- Error message from Spring Security -->
            <div th:if="${param.error}" class="badge badge-danger" style="width: 100%; text-align: center; padding: 12px; margin-bottom: 20px; border-radius: 10px;">
                Invalid username or password. Please try again.
            </div>

            <!-- Logout message -->
            <div th:if="${param.logout}" class="badge badge-warning" style="width: 100%; text-align: center; padding: 12px; margin-bottom: 20px; border-radius: 10px; color: #000;">
                You have been logged out successfully.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="auth-form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="Enter your username" required autofocus>
                </div>
                
                <div class="auth-form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" class="btn btn-primary auth-submit-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                        <polyline points="10 17 15 12 10 7"/>
                        <line x1="15" x2="3" y1="12" y2="12"/>
                    </svg>
                    Sign In
                </button>
            </form>
            
            <div class="auth-footer-link">
                Don't have an account? <a th:href="@{/register}">Sign Up</a>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout/main :: footer}"></footer>
    
    <script th:src="@{/js/main.js}"></script>
</body>
</html>
