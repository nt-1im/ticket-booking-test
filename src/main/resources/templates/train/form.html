<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/main :: head(${isEdit} ? 'Edit Train Timetable' : 'Create Train Timetable')}"></head>
<body>

    <header th:replace="~{layout/main :: navbar}"></header>
    
    <div th:replace="~{layout/main :: toasts}"></div>

    <main style="max-width: 800px;">
        <div class="glass-card">
            <h2 class="events-section-title" th:text="${isEdit} ? 'Edit Train Route Details' : 'Create New Train Route'">Create New Train Route</h2>
            <p style="color: var(--text-secondary); margin-bottom: 30px;">
                Enter information about the train number, departure/arrival stations, times, prices, and seats capacity.
            </p>

            <div th:if="${formError}" class="badge badge-danger" style="width: 100%; text-align: center; padding: 12px; margin-bottom: 20px; border-radius: 10px;" th:text="${formError}">
                Form error
            </div>

            <!-- Set correct action URL for Thymeleaf depending on mode -->
            <form th:action="${isEdit} ? @{/trains/edit/{id}(id=${train.id})} : @{/trains/new}" th:object="${train}" method="post">
                
                <div class="form-grid">
                    <div class="form-group">
                        <label for="trainNumber">Train Number</label>
                        <input type="text" id="trainNumber" th:field="*{trainNumber}" class="form-input" placeholder="e.g. SE1, SE3, SE5" required>
                        <div class="field-error" th:if="${#fields.hasErrors('trainNumber')}" th:errors="*{trainNumber}">Train Number Error</div>
                    </div>
                    
                    <div class="form-group">
                        <label for="price">Fare Price (₫)</label>
                        <input type="number" step="1" min="0" id="price" th:field="*{price}" class="form-input" placeholder="e.g. 1200000" required>
                        <div class="field-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}">Price Error</div>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="departureStation">Departure Station</label>
                        <input type="text" id="departureStation" th:field="*{departureStation}" class="form-input" placeholder="e.g. Hà Nội" required>
                        <div class="field-error" th:if="${#fields.hasErrors('departureStation')}" th:errors="*{departureStation}">Departure Station Error</div>
                    </div>

                    <div class="form-group">
                        <label for="arrivalStation">Arrival Station</label>
                        <input type="text" id="arrivalStation" th:field="*{arrivalStation}" class="form-input" placeholder="e.g. Sài Gòn" required>
                        <div class="field-error" th:if="${#fields.hasErrors('arrivalStation')}" th:errors="*{arrivalStation}">Arrival Station Error</div>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="departureDate">Departure Date</label>
                        <input type="date" id="departureDate" th:field="*{departureDate}" class="form-input" required>
                        <div class="field-error" th:if="${#fields.hasErrors('departureDate')}" th:errors="*{departureDate}">Date Error</div>
                    </div>
                    
                    <div class="form-group">
                        <label for="departureTime">Departure Time</label>
                        <input type="time" id="departureTime" th:field="*{departureTime}" class="form-input" required>
                        <div class="field-error" th:if="${#fields.hasErrors('departureTime')}" th:errors="*{departureTime}">Time Error</div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="totalSeats">Total Capacity (Seats)</label>
                    <input type="number" min="1" id="totalSeats" th:field="*{totalSeats}" class="form-input" placeholder="e.g. 100" required>
                    <div class="field-error" th:if="${#fields.hasErrors('totalSeats')}" th:errors="*{totalSeats}">Total Seats Error</div>
                </div>

                <div style="display: flex; gap: 16px; margin-top: 30px; justify-content: flex-end;">
                    <a th:href="@{/dashboard/seller}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary" th:text="${isEdit} ? 'Save Changes' : 'Publish Timetable'">
                        Publish Timetable
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer th:replace="~{layout/main :: footer}"></footer>
    
    <script th:src="@{/js/main.js}"></script>
</body>
</html>
